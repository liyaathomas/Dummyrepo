name: Playwright Tests
on:
  push:
    branches: 
       - interndetail
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install dependencies
      run: npm install

    - name: Run JavaScript 
      run: node intern.js

    - name: Upload Report
      uses: actions/upload-artifact@v4
      with:
        name: js-report
        path: output.txt

    
