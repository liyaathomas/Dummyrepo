name: Playwright test
on:
  push:
    branches: [main,master]
  pull_request:
    branches: [main,master]
job:
  test:
    timeout-minutes: 60
    runs-on : ubuntu-latest
    steps:
      name : actions/checkout@v4
      uses : actions/setup-node@v4
      with : 
        node-version: lts/*
    - name : Install Dependencies
      run : npm ci
    -name : Run js file
     run : node intern.js
